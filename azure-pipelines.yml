trigger:
  - main

resources:
  - repo: self

variables:
  - group: CICD

parameters:
  - name: tag
    default: "$(Build.BuildId)"
  - name: imageName
    default: "demo-page"

stages:
  - stage: CICD
    displayName: CICD workflow
    jobs:
      - job: Build
        displayName: Build
        pool:
          name: local-agent

        steps:
          - script: |
              echo "var=$(appVersion)"
              echo "tag=${{ parameters.tag }}"

          - task: Docker@2
            displayName: Build Docker Image
            inputs:
              command: build
              containerRegistry: registryConnection
              repository: ${{ parameters.imageName }}
              dockerfile: "**/Dockerfile"
              tags: ${{ parameters.tag }}
              arguments: "--build-arg VERSION=${{ parameters.tag }}"

          - task: Docker@2
            displayName: Push Docker Image
            inputs:
              command: push
              containerRegistry: registryConnection
              repository: ${{ parameters.imageName }}
              tags: ${{ parameters.tag }}

      - job: Deploy
        displayName: Deploy
        dependsOn: Build
        pool: local-agent
        steps: 
          - task: AzureContainerApps@1
            inputs:
              azureSubscription: 'appDeployConnection'
              imageToDeploy: acrappsjosue.azurecr.io/${{ parameters.imageName }}:$(Build.BuildId)
              containerAppName: app-demo-page
              resourceGroup: rg-devops
              acrUsername: $(acrUsername)
              acrPassword: $(acrPassword)

    