trigger:
  - main

resources:
  - repo: self

variables:
  - group: CICD

parameters:
  - name: imageName
    default: "demo-page"

stages:
  - stage: CICD
    displayName: CICD workflow

    jobs:
      - job: Build
        displayName: Build

        pool:
          name: local-agent

        steps:
          - bash: |
              SHORT_SHA=$(echo "$(Build.SourceVersion)" | cut -c1-7)
              echo "Commit: $(Build.SourceVersion)"
              echo "Short SHA: $SHORT_SHA"
              echo "##vso[task.setvariable variable=SHORT_SHA;isOutput=true]$SHORT_SHA"
            name: SetSha
            displayName: Set image tag from commit

          - task: Docker@2
            displayName: Build Docker Image
            inputs:
              command: build
              containerRegistry: registryConnection
              repository: ${{ parameters.imageName }}
              dockerfile: "**/Dockerfile"
              tags: |
                $(SHORT_SHA)
              arguments: "--build-arg VERSION=$(SHORT_SHA)"

          - task: Docker@2
            displayName: Push Docker Image
            inputs:
              command: push
              containerRegistry: registryConnection
              repository: ${{ parameters.imageName }}
              tags: |
                $(SHORT_SHA)

      - job: Deploy
        displayName: Deploy
        dependsOn: Build

        pool:
          name: local-agent

        variables:
          SHORT_SHA: $[ dependencies.Build.outputs['SetSha.SHORT_SHA'] ]

        steps:
          - task: AzureContainerApps@1
            displayName: Deploy Container App
            inputs:
              azureSubscription: appDeployConnection
              imageToDeploy: acrappsjosue.azurecr.io/${{ parameters.imageName }}:$(SHORT_SHA)
              containerAppName: app-demo-page
              resourceGroup: rg-devops
              acrUsername: $(acrUsername)
              acrPassword: $(acrPassword)